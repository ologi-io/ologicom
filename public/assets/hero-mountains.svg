<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Star field over a mountain range</title>
  <desc id="desc">A dark cinematic mountain landscape beneath a violet and blue night sky.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111a38"/>
      <stop offset=".42" stop-color="#584077"/>
      <stop offset=".67" stop-color="#9b6b94"/>
      <stop offset="1" stop-color="#121723"/>
    </linearGradient>
    <radialGradient id="glow" cx=".42" cy=".62" r=".6">
      <stop offset="0" stop-color="#f0b7ca" stop-opacity=".58"/>
      <stop offset=".42" stop-color="#7060b7" stop-opacity=".28"/>
      <stop offset="1" stop-color="#050506" stop-opacity="0"/>
    </radialGradient>
    <filter id="soften">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="stars" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="18" r="1.2" fill="#fff" opacity=".85"/>
      <circle cx="48" cy="44" r=".8" fill="#fff" opacity=".72"/>
      <circle cx="83" cy="27" r="1" fill="#dce8ff" opacity=".75"/>
      <circle cx="106" cy="92" r="1.3" fill="#fff" opacity=".8"/>
      <circle cx="21" cy="101" r=".7" fill="#fff" opacity=".72"/>
      <circle cx="68" cy="84" r=".9" fill="#fff" opacity=".65"/>
      <circle cx="113" cy="14" r=".7" fill="#fff" opacity=".72"/>
    </pattern>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9d9e4"/>
      <stop offset=".4" stop-color="#7f8194"/>
      <stop offset="1" stop-color="#11131a"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="#050506"/>
  <rect width="1600" height="770" fill="url(#sky)"/>
  <rect width="1600" height="770" fill="url(#glow)"/>
  <rect width="1600" height="650" fill="url(#stars)" opacity=".88"/>
  <ellipse cx="760" cy="660" rx="850" ry="180" fill="#d9a6c0" opacity=".22" filter="url(#soften)"/>
  <path d="M0 700 130 615l78 58 110-132 82 98 85-55 68 76 104-170 98 144 60-53 73 79 105-155 138 176 90-78 86 73 115-84 178 132v276H0z" fill="#07090f"/>
  <path d="m304 545 70 75 24-30 86 86-115-42-52 45-78-14zm320-46 73 113 33-52 66 80-83-30-46 62-67-42zm518 11 75 122 48-52 74 86-101-38-45 59-75-43z" fill="url(#snow)" opacity=".72"/>
  <path d="M0 768h1600v232H0z" fill="#050506"/>
  <path d="M0 777c260-48 518-49 774-3 292 53 556 38 826-31v257H0z" fill="#080a0e"/>
  <path d="M0 830h1600" stroke="#d7c1e4" stroke-opacity=".14"/>
  <rect width="1600" height="1000" fill="#050506" opacity=".23"/>
</svg>
